name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go ${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.25.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      # internal/uifs/uifs.go has //go:embed all:dist — Go won't compile
      # internal/uifs (and `go vet` won't run) until that directory has
      # at least one file. We ship a .gitkeep so basic vet/build works
      # on a fresh clone, and we build the real UI here so tests
      # exercise the actual embedded asset paths.
      - name: Build embedded UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: UI typecheck
        run: cd ui && npm run typecheck

      - name: UI tests
        if: matrix.os == 'ubuntu-latest'
        run: cd ui && npm test -- --run

      - name: go vet
        run: go vet -tags sqlite_fts5 ./...

      - name: build
        run: go build -tags sqlite_fts5 ./...

      - name: test
        run: go test -tags sqlite_fts5 -race -count=1 -coverprofile=coverage.out ./...

      - name: coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1

      - name: upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: coverage.out
          retention-days: 7
